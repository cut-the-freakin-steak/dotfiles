# ==============================================================================
# USER CONFIGURATION: keybinds.conf
# ==============================================================================
# Add your custom settings for keybinds here.
# These will override or add to the defaults found in ~/.config/hypr/source/keybinds.conf
# This file can also be edited with dusky keybinds manager from the rofi menu or from dusky control center
# ==============================================================================

# Auto-generated by FM Switcher
bindd = $mainMod, E, File Manager, exec, uwsm-app $fileManager

# Auto-generated by Browser Switcher
bindd = $mainMod, W, Launch Browser, exec, uwsm-app -- $browser

# Auto-generated by Text Editor Switcher
bindd = $mainMod, R, Open Text Editor, exec, uwsm-app $textEditor

# Auto-generated by Terminal Switcher
bindd = $mainMod, Q, Launch Terminal, exec, uwsm-app -- $terminal

# -- TERMINAL-CLIPBOARD-START --
unbind = $mainMod, V
bindd = $mainMod, V, Clipboard History, exec, $scripts/clipboard/close_terminal_clipboard.sh uwsm-app -- kitty --class terminal_clipboard.sh -e "$scripts/clipboard/terminal_clipboard.sh"
# -- TERMINAL-CLIPBOARD-END --

$utils_path = $HOME/dotfiles/utils

$TERMINAL = kitty
$EDITOR = neovide
$EXPLORER = dolphin
$BROWSER = helium-browser

unbind = ALT, SPACE
unbind = $mainMod SHIFT, A
unbind = CONTROL, V
unbind = CONTROL, C
unbind = CONTROL SHIFT, V
unbind = $mainMod, E
unbind = $mainMod, W
unbind = $mainMod, R
unbind = $mainMod, Q
unbind = $mainMod, V
unbind = $mainMod, Q
unbind = $mainMod, F
unbind = $mainMod, P
unbind = $mainMod, B
unbind = $mainMod, C
unbind = $mainMod, Z
unbind = $mainMod, A
unbind = $mainMod, S
unbind = $mainMod, X
unbind = $mainMod, U

# app launching
bindd = $mainMod, Return, Launch terminal emulator , exec, $TERMINAL
bindd = $mainMod, B, Launch web browser , exec, $BROWSER
bindd = $mainMod, C, Launch text editor , exec, $EDITOR
bindd = $mainMod, F, Launch file explorer , exec, $EXPLORER && XDG_MENU_PREFIX=arch- kbuildsycoca6
bindd = $mainMod, S, Launch steam , exec, uwsm-app -- steam
# bindd = $mainMod CONTROL, D, Launch Discord , exec, uwsm-app -- discord
bindd = $mainMod CONTROL, D, Launch Vesktop, exec, uwsm-app -- vesktop
bindd = $mainMod, O, Launch obs , exec, uwsm-app -- obs
bindd = $mainMod, P, Launch volume control , exec, uwsm-app -- pavucontrol
bindd = $mainMod, L, Launch blueman, exec, uwsm-app -- blueman-manager

# open side panel
bindd = $mainMod SHIFT, A, Open dusky side panel, exec, swaync-client -t

# window management
bindd = $mainMod, X, Close Window, exec, hyprctl dispatch killactive ""
bindd = $mainMod, W, Toggle floating, togglefloating
bindd = $mainMod, G, Toggle group, togglegroup
bindd = SHIFT, F11, Window Fullscreen, fullscreen, 0
# pullin the blanket over her :3
bindd = $mainMod CONTROL, X, $d kill all questionable windows, exec, $utils_path/pullin-the-blanket.sh

# focus changing
bindd = $mainMod, Left, Focus left, movefocus, l
bindd = $mainMod, Right, Focus right , movefocus, r
bindd = $mainMod, Up, Focus up , movefocus, u
bindd = $mainMod, Down , Focus down, movefocus, d
bindd = ALT, Tab, Cycle focus, cyclenext

# resize windows
bindde = $mainMod SHIFT, Right, Resize window right , resizeactive, 30 0
bindde = $mainMod SHIFT, Left, Resize window left, resizeactive, -30 0
bindde = $mainMod SHIFT, Up, Resize window up, resizeactive, 0 -30
bindde = $mainMod SHIFT, Down, Resize  window down, resizeactive, 0 30

# move active window around current workspace with mainMod + Shift + Control [←→↑↓]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
bindde = $mainMod SHIFT CONTROL, left, Move active window to the left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod SHIFT CONTROL, right, Move active window to the right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod SHIFT CONTROL, up, Move active window up, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod SHIFT CONTROL, down, Move active window down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

# move/resize focused window
binddm = $mainMod, mouse:272, Hold to move window, movewindow
binddm = $mainMod, mouse:273, Hold to resize window, resizewindow
# binddm = $mainMod, Z, $d hold to move window , movewindow
# binddm = $mainMod, X, $d hold to resize window, resizewindow

# toggle focused window split
bindd = $mainMod, J, Toggle split, togglesplit

# rofi menus
# bindd = ALT SHIFT, A, $d application finder , exec, env QS_NO_TTY=1 qs -c nucleus-shell ipc call launcher toggle
# bindd = ALT SHIFT, A, $d application finder , exec, env rofi -show drun
bind = $mainMod, A, exec, killall -SIGUSR1 waybar
bind = $mainMod CONTROL, A, exec, $utils_path/manage-waybar.sh
bindd = ALT SHIFT, A, Launch Menu for Apps, exec, pkill rofi; rofi -show drun -run-command "uwsm app -- {cmd}"
# bindd = $mainMod, TAB, $d window switcher , exec, pkill -x rofi || $rofi-launch w
# bindd = $mainMod SHIFT, E, $d file finder , exec, pkill -x rofi || $rofi-launch f
# bindd = $mainMod, slash, $d keybindings hint, exec, pkill -x rofi || $scrPath/keybinds_hint.sh c # launch keybinds hint
# bindd = $mainMod, comma, $d emoji  picker , exec, pkill -x rofi || $scrPath/emoji-picker.sh # launch emoji picker
# bindd = $mainMod, period, $d glyph picker , exec, pkill -x rofi || $scrPath/glyph-picker.sh # launch glyph picker
# bindd = $mainMod, V, $d clipboard ,  exec, pkill -x rofi || $scrPath/cliphist.sh -c # launch clipboard,
# bindd = $mainMod SHIFT, V, $d clipboard manager , exec, pkill -x rofi || $scrPath/cliphist.sh # launch clipboard Manager
# bindd = $mainMod SHIFT, A, $d select rofi launcher , exec, pkill -x rofi || $scrPath/rofiselect.sh # launch select menu


# hardware controls
# bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# media controls
# bind = , XF86AudioPlay, exec, playerctl play-pause
# bind = , XF86AudioNext, exec, playerctl next
# bind = , XF86AudioPrev, exec, playerctl previous
# bind = , XF86AudioStop, exec, playerctl stop

# brightness controls
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# keyboard backlight controls
bind = , XF86KbdBrightnessUp, exec, brightnessctl -d *kbd* set +10%
bind = , XF86KbdBrightnessDown, exec, brightnessctl -d *kbd* set 10%-

# screenshots
bindd = $mainMod SHIFT, P, Color Picker, exec, pkill hyprpicker || hyprpicker -a
binddl = CONTROL SHIFT, 3, Print monitor , exec, $utils_path/screenshots.sh screen # monitor screenshot capture
bindd = CONTROL SHIFT, 4, Snip screen , exec, $utils_path/screenshots.sh region # partial screenshot capture
# bindd = CONTROL SHIFT, 5, $d freeze and snip screen, exec, $scrPath/screenshot.sh sf # partial screenshot capture (frozen screen)

# workspace navigation
bindd = $mainMod, 1, Navigate to workspace 1 , workspace, 1
bindd = $mainMod, 2, Navigate to workspace 2 , workspace, 2
bindd = $mainMod, 3, Navigate to workspace 3 , workspace, 3
bindd = $mainMod, 4, Navigate to workspace 4 , workspace, 4
bindd = $mainMod, 5, Navigate to workspace 5 , workspace, 5
bindd = $mainMod, 6, Navigate to workspace 6 , workspace, 6
bindd = $mainMod, 7, Navigate to workspace 7 , workspace, 7
bindd = $mainMod, 8, Navigate to workspace 8 , workspace, 8
bindd = $mainMod, 9, Navigate to workspace 9 , workspace, 9
bindd = $mainMod CONTROL, Z, Navigate to workspace 4 , workspace, 4

# relative workspace
bindd = $mainMod CONTROL, Right, Change active workspace forwards  , workspace, r+1
bindd = $mainMod CONTROL, Left, Change active workspace backwards , workspace, r-1

# navigation
bindd = $mainMod CONTROL, Down, Navigate to the nearest empty workspace , workspace, empty

# move focused window to a workspace
bindd = $mainMod SHIFT, 1, Move to workspace 1 , movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move to workspace 2 , movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move to workspace 3 , movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move to workspace 4 , movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move to workspace 5 , movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move to workspace 6 , movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move to workspace 7 , movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move to workspace 8 , movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move to workspace 9 , movetoworkspace, 9

# move focused window to a relative workspace
bindd = $mainMod CONTROL+SHIFT, Right, Move window to next relative workspace , movetoworkspace, r+1
bindd = $mainMod CONTROL+SHIFT, Left, Move window to previous relative workspace , movetoworkspace, r-1


# scroll through existing workspaces
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1


# move/switch to special workspace (scratchpad)
bindd = $mainMod SHIFT, S, Move to scratchpad  , movetoworkspace, special
bindd = $mainMod ALT, S, Move to scratchpad (silent) , movetoworkspacesilent, special
# bindd = $mainMod, S, $d toggle scratchpad ,  togglespecialworkspace

# move focused window to a workspace silently
bindd = $mainMod ALT, 1, Move to workspace 1  (silent), movetoworkspacesilent, 1
bindd = $mainMod ALT, 2, Move to workspace 2  (silent), movetoworkspacesilent, 2
bindd = $mainMod ALT, 3, Move to workspace 3  (silent), movetoworkspacesilent, 3
bindd = $mainMod ALT, 4, Move to workspace 4  (silent), movetoworkspacesilent, 4
bindd = $mainMod ALT, 5, Move to workspace 5  (silent), movetoworkspacesilent, 5
bindd = $mainMod ALT, 6, Move to workspace 6  (silent), movetoworkspacesilent, 6
bindd = $mainMod ALT, 7, Move to workspace 7  (silent), movetoworkspacesilent, 7
bindd = $mainMod ALT, 8, Move to workspace 8  (silent), movetoworkspacesilent, 8
bindd = $mainMod ALT, 9, Move to workspace 9  (silent), movetoworkspacesilent, 9

$d=#! unset the group name

# zooooooom
bind = $mainMod CONTROL, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod CONTROL, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.6')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.4) | if . < 1 then 1 else . end')
binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1 bind = $mainMod SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

# minimize window
bind = $mainMod, Z, exec, niflveil minimize

# open minimized window interface
bind = $mainMod, I, exec, niflveil restore

# restore the last minimized window
bind = $mainMod, U, exec, niflveil restore-last
